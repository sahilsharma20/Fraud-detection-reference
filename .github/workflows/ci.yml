# CI/CD (Module 14): on every push/PR -> lint + tests; if green -> build the
# production Docker image (proving the Dockerfile + serve deps are deployable).
name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check src tests app.py scripts monitoring

      - name: Run tests (unit + API integration)
        run: pytest -q

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test          # only build if lint + tests pass
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: fraud-severity:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image boots & serves /health
        run: |
          docker run -d --name app -p 8000:8000 fraud-severity:ci
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/health | grep -q '"models_loaded":true'; then
              echo "Service healthy"; docker logs app; exit 0
            fi
            sleep 2
          done
          echo "Service failed to become healthy"; docker logs app; exit 1
